name: Deploy to CloudPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          N8N_SECRET_KEY: ${{ secrets.N8N_SECRET_KEY }}

      - name: Copy .next build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 213.199.39.103
          username: breakupformen
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".next,public,package.json,package-lock.json"
          target: "/home/breakupformen/htdocs/breakupformen.com"

      - name: Start app on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 213.199.39.103
          username: breakupformen
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/breakupformen/htdocs/breakupformen.com

            # כתיבת משתני סביבה
            cat > .env.local << ENVEOF
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            N8N_SECRET_KEY=${{ secrets.N8N_SECRET_KEY }}
            ENVEOF

            npm install --production

            # pm2 עם prefix אישי
            npm config set prefix ~/.npm-global
            export PATH="$HOME/.npm-global/bin:$PATH"
            npm install -g pm2

            pm2 restart breakupformen || pm2 start npm --name "breakupformen" -- start
            pm2 save
