name: Deploy to CloudPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          N8N_SECRET_KEY: ${{ secrets.N8N_SECRET_KEY }}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 213.199.39.103
          username: breakupformen
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,N8N_SECRET_KEY
          script: |
            export PATH="$PATH:$HOME/.npm-global/bin:/usr/local/bin"
            cd /home/breakupformen/htdocs/breakupformen.com
            git fetch origin main
            git reset --hard origin/main
            npm install

            # שמירת משתני סביבה בקובץ
            echo "NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL" > .env.local
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY" >> .env.local
            echo "N8N_SECRET_KEY=$N8N_SECRET_KEY" >> .env.local

            npm run build

            # pm2
            which pm2 || npm install -g pm2
            pm2 restart breakupformen || pm2 start npm --name "breakupformen" -- start
            pm2 save
